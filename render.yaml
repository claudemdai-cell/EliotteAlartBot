services:
  - type: web
    name: elliott-alert-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd bot && python main.py
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: GROWTH_TELEGRAM_TOKEN
        sync: false
      - key: GROWTH_TELEGRAM_CHAT_ID
        sync: false
      - key: UTC_OFFSET_HOURS
        sync: false
